apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: developer-role
rules:
  - apiGroups: ["", "apps", "networking.k8s.io"]
    resources: ["pods", "services", "deployments", "replicasets", "ingresses", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
