apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: 961544628649.dkr.ecr.ap-south-1.amazonaws.com/order-service:v1
          ports:
            - containerPort: 3003
          env:
            - name: DB_HOST
              value: "172.17.0.1"
